<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Ficha RPG 3D&T Alpha</title>

<link
rel="stylesheet"
href="style.css"
>

</head>

<body>

<div class="background-overlay"></div>

<div class="ficha">

<h1>Ficha RPG 3D&T Alpha</h1>

<!-- ABAS -->

<div class="abas">

<button
class="aba-btn ativa"
onclick="abrirAba(event,'abaPrincipal')"
>

Principal

</button>

<button
class="aba-btn"
onclick="abrirAba(event,'abaVantagens')"
>

Vantagens

</button>

<button
class="aba-btn"
onclick="abrirAba(event,'abaInventario')"
>

Inventário

</button>

<button
class="aba-btn"
onclick="abrirAba(event,'abaMagias')"
>

Magias

</button>

<button
class="aba-btn"
onclick="abrirAba(event,'abaKits')"
>

Kits

</button>

</div>

<!-- ABA PRINCIPAL -->

<div
id="abaPrincipal"
class="aba-conteudo ativa"
>

<div class="topo">

<!-- ESQUERDA -->

<div class="painel-esquerdo bloco-rpg">

<input
type="text"
class="nome-personagem"
placeholder="Personagem"
>

<div class="preview-container">

<img
id="preview"
src=""
alt="Avatar"
>

</div>

<input
type="file"
id="uploadImagem"
accept="image/png, image/jpeg"
>

</div>

<!-- CENTRO -->

<div class="status-centro bloco-rpg">

<div class="status-grid">

<!-- F -->

<div class="atributo">

<span>F</span>

<input type="number" id="forca" value="0" min="0">

<input type="number" id="bonusForca" class="bonus" value="0">

<button
class="teste-btn"
onclick="
testarAtributo(
'Força',
'forca',
'bonusForca'
)
"
>

🎲

</button>

</div>

<!-- H -->

<div class="atributo">

<span>H</span>

<input type="number" id="habilidade" value="0" min="0">

<input type="number" id="bonusHabilidade" class="bonus" value="0">

<button
class="teste-btn"
onclick="
testarAtributo(
'Habilidade',
'habilidade',
'bonusHabilidade'
)
"
>

🎲

</button>

</div>

<!-- R -->

<div class="atributo">

<span>R</span>

<input type="number" id="resistencia" value="0" min="0">

<input type="number" id="bonusResistencia" class="bonus" value="0">

<button
class="teste-btn"
onclick="
testarAtributo(
'Resistência',
'resistencia',
'bonusResistencia'
)
"
>

🎲

</button>

</div>

<!-- A -->

<div class="atributo">

<span>A</span>

<input type="number" id="armadura" value="0" min="0">

<input type="number" id="bonusArmadura" class="bonus" value="0">

<button
class="teste-btn"
onclick="
testarAtributo(
'Armadura',
'armadura',
'bonusArmadura'
)
"
>

🎲

</button>

</div>

<!-- PV -->

<div class="atributo-mini">

<span>PV</span>

<input
type="number"
placeholder="Total"
>

<input
type="number"
placeholder="Atual"
>

</div>

<!-- PDF -->

<div class="atributo">

<span>PdF</span>

<input type="number" id="pdf" value="0" min="0">

<input type="number" id="bonusPdf" class="bonus" value="0">

<button
class="teste-btn"
onclick="
testarAtributo(
'PdF',
'pdf',
'bonusPdf'
)
"
>

🎲

</button>

</div>

<!-- PM -->

<div class="atributo-mini">

<span>PM</span>

<input
type="number"
placeholder="Total"
>

<input
type="number"
placeholder="Atual"
>

</div>

</div>

</div>

<!-- DIREITA -->

<div class="painel-direito bloco-rpg">

<div id="resultado">

Resultado das rolagens...

</div>

<div class="linha-mini-box">

<div class="mini-box">

<span>Pontos</span>

<input
type="number"
id="pontosPersonagem"
value="10"
min="0"
>

</div>

<div class="mini-box">

<span>XP</span>

<input
type="number"
id="xp"
value="0"
min="0"
>

</div>

<div class="mini-box">

<span>T$</span>

<input
type="number"
id="dinheiro"
value="0"
min="0"
>

</div>

</div>

<div class="acoes-verticais">

<button onclick="ataqueCurto()">

⚔️ Ataque Curto

</button>

<button onclick="ataqueDistancia()">

🏹 Ataque Distância

</button>

<button onclick="defesa()">

🛡️ Defesa

</button>

</div>

</div>

</div>

<!-- VANTAGEM ÚNICA -->

<div class="vantagem-unica bloco-rpg">

<h2>Vantagem Única</h2>

<div
id="vantagemUnicaContainer"
class="lista"
>

</div>

</div>

</div>

<!-- ABA VANTAGENS -->

<div
id="abaVantagens"
class="aba-conteudo"
>

<div class="conteudo-ficha tres-colunas">

<div class="bloco-ficha">

<h2>Vantagens</h2>

<div id="vantagensContainer" class="lista"></div>

<button
class="add-btn"
onclick="
adicionarItem(
'vantagensContainer',
'vantagem'
)
"
>

+ Vantagem

</button>

</div>

<div class="bloco-ficha">

<h2>Desvantagens</h2>

<div id="desvantagensContainer" class="lista"></div>

<button
class="add-btn"
onclick="
adicionarItem(
'desvantagensContainer',
'desvantagem'
)
"
>

+ Desvantagem

</button>

</div>

<div class="bloco-ficha">

<h2>Perícias</h2>

<div id="periciasContainer" class="lista"></div>

<button
class="add-btn"
onclick="
adicionarItem(
'periciasContainer',
'pericia'
)
"
>

+ Perícia

</button>

</div>

</div>

</div>

<!-- ABA INVENTÁRIO -->

<div
id="abaInventario"
class="aba-conteudo"
>

<div class="conteudo-ficha tres-colunas">

<div class="bloco-ficha">

<h2>Itens</h2>

<div id="itensContainer" class="lista"></div>

<button
class="add-btn"
onclick="
adicionarItem(
'itensContainer',
'item'
)
"
>

+ Item

</button>

</div>

<div class="bloco-ficha">

<h2>Equipamentos</h2>

<div id="equipamentosContainer" class="lista"></div>

<button
class="add-btn"
onclick="
adicionarItem(
'equipamentosContainer',
'equipamento'
)
"
>

+ Equipamento

</button>

</div>

<div class="bloco-ficha">

<h2>Tipos de Dano</h2>

<div id="tiposDanoContainer" class="lista"></div>

<button
class="add-btn"
onclick="adicionarTipoDano()"
>

+ Tipo de Dano

</button>

</div>

</div>

</div>

<!-- ABA MAGIAS -->

<div
id="abaMagias"
class="aba-conteudo"
>

<div class="conteudo-ficha">

<div class="bloco-ficha">

<h2>Magias</h2>

<div
id="magiasContainer"
class="lista"
>

</div>

<button
class="add-btn"
onclick="
adicionarItem(
'magiasContainer',
'magia'
)
"
>

+ Magia

</button>

</div>

</div>

</div>

<!-- ABA KITS -->

<div
id="abaKits"
class="aba-conteudo"
>

<div class="secao">

<h2>Kits de Personagem</h2>

<div
id="kitContainer"
class="kits-grid"
>

</div>

<button
class="add-btn"
onclick="adicionarKit()"
>

+ Novo Kit

</button>

</div>

</div>

<!-- POPUP -->

<div
id="popup"
class="popup oculto"
>

<div class="popup-conteudo">

<button
class="fechar-popup"
onclick="fecharPopup()"
>

X

</button>

<h2 id="popupTitulo"></h2>

<p id="popupTexto"></p>

</div>

</div>

<!-- EDITOR -->

<div
id="popupEditor"
class="popup oculto"
>

<div class="popup-conteudo">

<button
class="fechar-popup"
onclick="fecharEditor()"
>

X

</button>

<h2>Descrição</h2>

<textarea
id="editorTexto"
class="editor-texto"
></textarea>

<button
class="salvar-editor"
onclick="salvarDescricao()"
>

Salvar

</button>

</div>

</div>

<div id="dice3d">

🎲

</div>

<script src="script.js"></script>

</body>
</html>
